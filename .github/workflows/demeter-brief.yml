name: DEMETER Morning Brief

on:
  schedule:
    # 06:30 UTC = 07:30 BST (British Summer Time, UTC+1, May–Oct)
    # Note: this fires at 07:30 BST in summer; in winter (GMT, UTC+0) it fires at 06:30 local.
    # Adjust to 07:30 UTC for winter if needed; two cron lines would cover both offsets year-round.
    - cron: '30 6 * * 1-5'
  workflow_dispatch: # manual trigger for testing and deployment verification

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DEMETER brief
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.MAIA_API_KEY }}" \
            "${{ vars.MAIA_URL }}/api/demeter/brief"
